<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2196F3" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>แอพคำนวณระยะทาง</h1>
    <p>ใส่พิกัดหรือจุดสองจุด แล้วกดคำนวณ</p>

    <section class="card">
      <h2>คำนวณระยะทางระหว่างพิกัดภูมิศาสตร์</h2>
      <div class="row">
        <div>
          <label for="lat1">ละติจูด 1</label>
          <input id="lat1" type="number" step="any" value="13.7563" />
        </div>
        <div>
          <label for="lon1">ลองจิจูด 1</label>
          <input id="lon1" type="number" step="any" value="100.5018" />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="lat2">ละติจูด 2</label>
          <input id="lat2" type="number" step="any" value="13.7367" />
        </div>
        <div>
          <label for="lon2">ลองจิจูด 2</label>
          <input id="lon2" type="number" step="any" value="100.5231" />
        </div>
      </div>
      <button id="geoBtn">คำนวณ Haversine</button>
      <p id="geoResult" class="result"></p>
    </section>

    <section class="card">
      <h2>คำนวณระยะทางจุดในระนาบ 2 มิติ</h2>
      <div class="row">
        <div>
          <label for="x1">X1</label>
          <input id="x1" type="number" step="any" value="0" />
        </div>
        <div>
          <label for="y1">Y1</label>
          <input id="y1" type="number" step="any" value="0" />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="x2">X2</label>
          <input id="x2" type="number" step="any" value="3" />
        </div>
        <div>
          <label for="y2">Y2</label>
          <input id="y2" type="number" step="any" value="4" />
        </div>
      </div>
      <button id="planeBtn">คำนวณระยะทาง</button>
      <p id="planeResult" class="result"></p>
    </section>
  </main>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
